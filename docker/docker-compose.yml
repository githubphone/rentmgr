version: "3.4"

name: ruoyi-system

services:
  polardb:
    container_name: ruoyi-polardb
    image: polardb/polardb_pg_local_instance
    restart: unless-stopped
    tty: true
    privileged: true
    cap_add:
      - SYS_PTRACE
    environment:
      POLARDB_PORT: 5432
      POLARDB_USER: postgres
      POLARDB_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - ./data/polardb:/var/polardb

  redis:
    container_name: ruoyi-redis
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - ./data/redis:/data

  server:
    container_name: ruoyi-server
    image: eclipse-temurin:21-jre
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      # 设置 TZ 时区
      TZ: Asia/Shanghai
      # Java启动参数
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx512m -Djava.security.egd=file:/dev/./urandom}
      # Spring Boot配置
      SPRING_PROFILES_ACTIVE: druid
    volumes:
      # 映射本地编译好的后端jar包和配置文件
      - ./backend:/app:ro
      # 映射日志目录
      - ./backend/logs:/app/logs
      # 映射上传文件目录
      - ./backend/uploadPath:/app/uploadPath
    working_dir: /app
    command: java ${JAVA_OPTS} -jar /app/ruoyi-admin.jar --spring.config.location=/app/
    depends_on:
      - polardb
      - redis

  admin:
    container_name: ruoyi-admin
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      # 映射本地编译好的前端dist目录
      - ./frontend/dist:/usr/share/nginx/html:ro
      # 映射nginx配置文件
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
      # 映射上传文件目录供nginx访问
      - ./backend/uploadPath:/var/nginx/profile:ro
    depends_on:
      - server


