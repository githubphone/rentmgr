<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" id="viewportMeta" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, minimum-scale=0.5, user-scalable=yes, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="format-detection" content="telephone=no">
  <title>租赁管理系统</title>
  <link rel="icon" href="/assets/favicon.ico">
  <script>
    // 检测是否为桌面浏览器，动态调整 viewport
    (function() {
      var isDesktop = !/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      if (isDesktop) {
        var meta = document.getElementById('viewportMeta');
        if (meta) {
          meta.setAttribute('content', 'width=device-width, initial-scale=1.5, maximum-scale=3.0, minimum-scale=1.0, user-scalable=yes');
        }
      }
    })();
  </script>
</head>
<body>
  <div id="app"></div>
</body>
</html>
