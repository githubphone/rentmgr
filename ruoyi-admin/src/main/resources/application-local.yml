# 本地开发配置
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driverClassName: org.postgresql.Driver
    druid:
      master:
        url: jdbc:postgresql://localhost:5432/postgres?useUnicode=true&characterEncoding=utf8
        username: postgres
        password: 123456
      slave:
        enabled: false
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      timeout: 10s
